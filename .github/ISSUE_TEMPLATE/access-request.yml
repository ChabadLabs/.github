name: Request Access to GabAI
description: Request access to the GabAI skills marketplace for shluchim
title: "Access Request: [Your Name]"
labels: ["access-request"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your interest in GabAI! Please fill out the information below
        and we'll get you set up.
  - type: input
    id: name
    attributes:
      label: Full Name
      placeholder: "Rabbi Shmuel Munkis"
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Chabad House / Location
      placeholder: "Chabad of Liadi"
    validations:
      required: true
  - type: input
    id: github
    attributes:
      label: GitHub Username
      placeholder: "@username"
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: What are you hoping to use GabAI for?
      placeholder: "I'd like to set up a WhatsApp bot for my community that can..."
    validations:
      required: false
